[project]
name = "flake-tidy"
version = "0.1.0"
description = "Deduplicate and flatten Nix flake inputs by adding follows declarations"
requires-python = ">=3.11"

[tool.uv]
dev-dependencies = ["pytest>=8.0", "pytest-cov>=5.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
